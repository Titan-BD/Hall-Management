<!DOCTYPE HTML>
<html>
<head>
  <title>Advanced Power Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="/socket.io/socket.io.js"></script>
  <!-- Chart.js Library -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root { --bg-color: #1a1a2e; --card-bg: #16213e; --text-color: #ffffff; --label-color: #a0aec0; --border-color: #2d3748; }
    body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; margin: 0; }
    .header { max-width: 1200px; margin: 0 auto 20px auto; text-align: center; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto 30px auto; }
    .card { background: var(--card-bg); border-radius: 12px; padding: 15px; border: 1px solid var(--border-color); display: flex; align-items: center; }
    .icon { font-size: 30px; margin-right: 15px; }
    .content { display: flex; flex-direction: column; }
    .label { font-size: 11px; color: var(--label-color); font-weight: 600; }
    .value { font-size: 20px; font-weight: 600; }
    .chart-container { max-width: 1200px; margin: 0 auto; background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border-color); }
    .fa-bolt { color: #f1c40f; } .fa-exchange-alt { color: #3498db; } .fa-plug { color: #e74c3c; } 
    .fa-chart-line { color: #2ecc71; } .fa-wave-square { color: #9b59b6; } .fa-percent { color: #e67e22; }
  </style>
</head>
<body>
  <div class="header">
    <h1><i class="fas fa-plug" style="color: #f1c40f;"></i> Live Analytics Dashboard</h1>
  </div>
  
  <div class="grid">
    <div class="card"><i class="fas fa-bolt icon"></i><div class="content"><div class="label">VOLTAGE</div><div class="value" id="voltage">0.0V</div></div></div>
    <div class="card"><i class="fas fa-exchange-alt icon"></i><div class="content"><div class="label">CURRENT</div><div class="value" id="current">0.00A</div></div></div>
    <div class="card"><i class="fas fa-plug icon"></i><div class="content"><div class="label">POWER</div><div class="value" id="power">0.0W</div></div></div>
    <div class="card"><i class="fas fa-chart-line icon"></i><div class="content"><div class="label">ENERGY</div><div class="value" id="energy">0.000kWh</div></div></div>
  </div>

  <!-- গ্রাফের জন্য ক্যানভাস -->
  <div class="chart-container">
    <canvas id="realtimeChart"></canvas>
  </div>

  <script>
    // গ্রাফ সেটআপ
    const ctx = document.getElementById('realtimeChart').getContext('2d');
    const realtimeChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [
                { label: 'Power (W)', data: [], borderColor: '#e74c3c', backgroundColor: 'rgba(231, 76, 60, 0.1)', fill: true, tension: 0.3 },
                { label: 'Voltage (V)', data: [], borderColor: '#f1c40f', backgroundColor: 'rgba(241, 196, 15, 0.1)', fill: false, tension: 0.3 }
            ]
        },
        options: { responsive: true, scales: { x: { grid: { display: false } }, y: { beginAtZero: false } } }
    });

    // পেজ লোড হলে ডেটাবেস থেকে পুরনো শেষ ৩০টি ডেটা এনে গ্রাফে দেখানো
    fetch('/api/history')
      .then(res => res.json())
      .then(data => {
          data.forEach(item => {
              const time = new Date(item.timestamp).toLocaleTimeString();
              realtimeChart.data.labels.push(time);
              realtimeChart.data.datasets[0].data.push(item.power);
              realtimeChart.data.datasets[1].data.push(item.voltage);
          });
          realtimeChart.update();
      });

    // রিয়েল-টাইม আপডেট ও গ্রাফ স্ক্রোলিং
    const socket = io();
    socket.on('powerUpdate', (data) => {
        document.getElementById('voltage').innerText = data.voltage + 'V';
        document.getElementById('current').innerText = data.current + 'A';
        document.getElementById('power').innerText = data.power + 'W';
        document.getElementById('energy').innerText = data.energy + 'kWh';

        const now = new Date().toLocaleTimeString();
        
        // নতুন ডেটা গ্রাফে পুশ করা
        realtimeChart.data.labels.push(now);
        realtimeChart.data.datasets[0].data.push(data.power);
        realtimeChart.data.datasets[1].data.push(data.voltage);

        // গ্রাফে ৩০টির বেশি ডেটা হলে প্রথমটি ডিলিট করে স্ক্রোল করা
        if(realtimeChart.data.labels.length > 30) {
            realtimeChart.data.labels.shift();
            realtimeChart.data.datasets[0].data.shift();
            realtimeChart.data.datasets[1].data.shift();
        }
        realtimeChart.update();
    });
  </script>
</body>
</html>
