<!DOCTYPE HTML>
<html>
<head>
  <title>Login - IRZA Labs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #0c0c0e; color: #ffffff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .login-card { background: #13131a; padding: 40px; border-radius: 12px; border: 1px solid #222227; text-align: center; width: 100%; max-width: 360px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .icon { font-size: 50px; color: #00b37e; margin-bottom: 20px; }
    h2 { margin-bottom: 10px; font-size: 20px; }
    p { color: #8d8d99; font-size: 14px; margin-bottom: 30px; }
    input[type="password"] { width: 90%; padding: 12px; background: #1c1c22; border: 1px solid #222227; border-radius: 6px; color: white; font-size: 16px; margin-bottom: 20px; outline: none; text-align: center; }
    input[type="password"]:focus { border-color: #00b37e; }
    button { width: 98%; padding: 12px; background: #00b37e; border: none; color: white; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #00875f; }
    .error-msg { color: #f75a68; font-size: 14px; margin-top: 15px; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <i class="fas fa-shield-alt icon"></i>
    <h2>IRZA Labs Gateway</h2>
    <p>Enter password to access Hall Management Dashboard</p>
    <input type="password" id="passwordField" placeholder="Enter Access Password" onkeypress="handleKeyPress(event)">
    <button onclick="attemptLogin()">Access Dashboard</button>
    <div id="error" class="error-msg"></div>
  </div>

  <script>
    function handleKeyPress(e) { if (e.key === 'Enter') attemptLogin(); }
    function attemptLogin() {
        const password = document.getElementById('passwordField').value;
        const errorDiv = document.getElementById('error');
        fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) { window.location.href = '/'; } 
            else { errorDiv.innerText = data.message; errorDiv.style.display = 'block'; }
        });
    }
  </script>
</body>
</html>
